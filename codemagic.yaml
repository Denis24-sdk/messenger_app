workflows:
  ios-adhoc:
    name: iOS Ad-Hoc Build
    environment:
      vars:
        APP_NAME: "Messenger"
        BUNDLE_ID: "com.example.messengerFlutter"
        CLOUDINARY_CLOUD_NAME: $CLOUDINARY_PROD_NAME
        CLOUDINARY_UPLOAD_PRESET: $CLOUDINARY_UPLOAD_PRESET


      apple_signing:
        distribution_type: ad_hoc
        team_id: $APPLE_TEAM_ID
        certificate: $APPLE_CERTIFICATE
        provisioning_profile: $APPLE_ADHOC_PROVISIONING_PROFILE
        bundle_identifier: $BUNDLE_ID

    scripts:
      - name: Build iOS IPA
        script: |
          # Установка зависимостей
          flutter pub get
          cd ios
          pod install
          cd ..
          
          # Сборка IPA
          flutter build ipa --release \
            --dart-define=CLOUDINARY_CLOUD_NAME=$CLOUDINARY_CLOUD_NAME \
            --dart-define=CLOUDINARY_UPLOAD_PRESET=$CLOUDINARY_UPLOAD_PRESET \
            -t lib/main.dart \
            --export-options-plist=ios/export_options.plist
          
          # Переименование IPA
          mkdir -p artifacts/ios
          cp build/ios/ipa/*.ipa artifacts/ios/$APP_NAME.ipa

    artifacts:
      - artifacts/ios/*.ipa

  android-release:
    name: Android Release Build
    environment:
      vars:
        APP_NAME: "Messenger"
        CLOUDINARY_CLOUD_NAME: $CLOUDINARY_PROD_NAME
        CLOUDINARY_UPLOAD_PRESET: $CLOUDINARY_UPLOAD_PRESET

    scripts:
      - name: Build Android APK
        script: |
          # Сборка release APK
          flutter build apk --release \
            --dart-define=CLOUDINARY_CLOUD_NAME=$CLOUDINARY_CLOUD_NAME \
            --dart-define=CLOUDINARY_UPLOAD_PRESET=$CLOUDINARY_UPLOAD_PRESET \
            -t lib/main.dart
          
          # Переименование APK
          mkdir -p artifacts/android
          cp build/app/outputs/flutter-apk/app-release.apk artifacts/android/$APP_NAME.apk

    artifacts:
      - artifacts/android/*.apk

  web-workflow:
    name: Web Build
    environment:
      vars:
        CLOUDINARY_CLOUD_NAME: $CLOUDINARY_PROD_NAME
        CLOUDINARY_UPLOAD_PRESET: $CLOUDINARY_UPLOAD_PRESET
    scripts:
      - name: Build Web
        script: |
          flutter build web \
            --dart-define=CLOUDINARY_CLOUD_NAME=$CLOUDINARY_CLOUD_NAME \
            --dart-define=CLOUDINARY_UPLOAD_PRESET=$CLOUDINARY_UPLOAD_PRESET \
            -t lib/main.dart
    artifacts:
      - build/web/**

  windows-workflow:
    name: Windows Build
    environment:
      vars:
        CLOUDINARY_CLOUD_NAME: $CLOUDINARY_PROD_NAME
        CLOUDINARY_UPLOAD_PRESET: $CLOUDINARY_UPLOAD_PRESET
    scripts:
      - name: Build Windows
        script: |
          flutter build windows \
            --dart-define=CLOUDINARY_CLOUD_NAME=$CLOUDINARY_CLOUD_NAME \
            --dart-define=CLOUDINARY_UPLOAD_PRESET=$CLOUDINARY_UPLOAD_PRESET \
            -t lib/main.dart
    artifacts:
      - build/windows/runner/Release/**/*.exe

  linux-workflow:
    name: Linux Build
    environment:
      vars:
        CLOUDINARY_CLOUD_NAME: $CLOUDINARY_PROD_NAME
        CLOUDINARY_UPLOAD_PRESET: $CLOUDINARY_UPLOAD_PRESET
    scripts:
      - name: Build Linux
        script: |
          flutter build linux \
            --dart-define=CLOUDINARY_CLOUD_NAME=$CLOUDINARY_CLOUD_NAME \
            --dart-define=CLOUDINARY_UPLOAD_PRESET=$CLOUDINARY_UPLOAD_PRESET \
            -t lib/main.dart
    artifacts:
      - build/linux/**/*.AppImage

  macos-workflow:
    name: macOS Build
    environment:
      vars:
        CLOUDINARY_CLOUD_NAME: $CLOUDINARY_PROD_NAME
        CLOUDINARY_UPLOAD_PRESET: $CLOUDINARY_UPLOAD_PRESET
    scripts:
      - name: Build macOS
        script: |
          flutter build macos \
            --dart-define=CLOUDINARY_CLOUD_NAME=$CLOUDINARY_CLOUD_NAME \
            --dart-define=CLOUDINARY_UPLOAD_PRESET=$CLOUDINARY_UPLOAD_PRESET \
            -t lib/main.dart
    artifacts:
      - build/macos/Build/Products/Release/*.app

# Общий раздел для файлов (вне workflow)
files:
  - ios/export_options.plist